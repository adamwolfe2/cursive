<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursive AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Auth screen -->
    <div id="auth-screen" class="screen">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#2563eb"/><path d="M8 12.5c0-2.5 1.8-4.5 4-4.5s4 2 4 4.5-1.8 4.5-4 4.5" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Cursive AI</span>
      </div>
      <p class="subtitle">Connect your Cursive workspace to start enriching leads.</p>
      <input type="text" id="api-key-input" placeholder="Paste your API key (lm_...)" />
      <button id="connect-btn" class="btn-primary">Connect</button>
      <p class="hint">Find your API key at <a href="https://leads.meetcursive.com/settings/integrations" target="_blank">Settings &gt; Integrations</a></p>
      <p id="auth-error" class="error hidden"></p>
    </div>

    <!-- Main screen -->
    <div id="main-screen" class="screen hidden">
      <div class="header">
        <div class="logo-sm">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#2563eb"/><path d="M8 12.5c0-2.5 1.8-4.5 4-4.5s4 2 4 4.5-1.8 4.5-4 4.5" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
          <span>Cursive</span>
        </div>
        <div class="credits" id="credit-display">
          <span id="credit-count">--</span> credits
        </div>
      </div>

      <!-- Quick search -->
      <div class="search-section">
        <input type="text" id="search-name" placeholder="Name (e.g. John Smith)" />
        <input type="text" id="search-company" placeholder="Company or domain" />
        <button id="search-btn" class="btn-primary">
          <span id="search-text">Find</span>
          <span id="search-loading" class="hidden">...</span>
        </button>
      </div>

      <!-- Results -->
      <div id="results" class="hidden">
        <div class="result-card">
          <div class="result-name" id="result-name"></div>
          <div class="result-title" id="result-title"></div>
          <div class="result-field" id="result-email-row">
            <span class="field-label">Email</span>
            <span class="field-value" id="result-email"></span>
            <button class="copy-btn" id="copy-email">Copy</button>
          </div>
          <div class="result-field" id="result-phone-row">
            <span class="field-label">Phone</span>
            <span class="field-value" id="result-phone"></span>
            <button class="copy-btn" id="copy-phone">Copy</button>
          </div>
          <div class="result-field" id="result-company-row">
            <span class="field-label">Company</span>
            <span class="field-value" id="result-company"></span>
          </div>
          <button id="save-btn" class="btn-secondary">Save to Cursive</button>
        </div>
      </div>

      <div id="search-error" class="error hidden"></div>

      <!-- Footer -->
      <div class="footer">
        <a href="https://leads.meetcursive.com/dashboard" target="_blank">Dashboard</a>
        <span class="dot">·</span>
        <a id="disconnect-btn" href="#">Disconnect</a>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
