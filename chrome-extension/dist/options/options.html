<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cursive AI — Extension Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 480px; margin: 40px auto; padding: 20px; color: #1f2937; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 4px; }
    input { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
    .btn { padding: 8px 16px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn:hover { background: #1d4ed8; }
    .btn-outline { background: white; color: #6b7280; border: 1px solid #d1d5db; }
    .btn-outline:hover { background: #f9fafb; }
    .btn-group { display: flex; gap: 8px; margin-top: 8px; }
    .status { font-size: 12px; margin-top: 12px; padding: 8px; border-radius: 4px; }
    .status.success { background: #f0fdf4; color: #15803d; }
    .status.error { background: #fef2f2; color: #dc2626; }
    .section { margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid #f3f4f6; }
    .hint { font-size: 11px; color: #9ca3af; margin-top: -12px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1>Cursive AI Settings</h1>
  <p class="subtitle">Configure your Chrome extension connection.</p>

  <div class="section">
    <label for="api-key">API Key</label>
    <input type="text" id="api-key" placeholder="lm_..." />
    <p class="hint">Find at Settings > Integrations in your Cursive dashboard</p>
    <div class="btn-group">
      <button class="btn" id="save-btn">Save Key</button>
      <button class="btn btn-outline" id="clear-btn">Clear Key</button>
    </div>
    <div id="status" class="status" style="display:none"></div>
  </div>

  <div class="section">
    <label>Cache</label>
    <p class="hint" style="margin-top:0;margin-bottom:8px">Clear locally cached enrichment results (24-hour TTL)</p>
    <button class="btn btn-outline" id="clear-cache-btn">Clear Cache</button>
  </div>

  <script>
    const STORAGE_KEY = 'cursive_api_key'
    const CACHE_PREFIX = 'cursive_cache_'

    const apiKeyInput = document.getElementById('api-key')
    const saveBtn = document.getElementById('save-btn')
    const clearBtn = document.getElementById('clear-btn')
    const clearCacheBtn = document.getElementById('clear-cache-btn')
    const status = document.getElementById('status')

    // Load
    chrome.storage.sync.get(STORAGE_KEY, (result) => {
      if (result[STORAGE_KEY]) {
        apiKeyInput.value = result[STORAGE_KEY]
      }
    })

    function showStatus(msg, type) {
      status.textContent = msg
      status.className = 'status ' + type
      status.style.display = 'block'
      setTimeout(() => { status.style.display = 'none' }, 3000)
    }

    saveBtn.addEventListener('click', () => {
      const key = apiKeyInput.value.trim()
      if (!key) return showStatus('Enter an API key', 'error')
      chrome.storage.sync.set({ [STORAGE_KEY]: key }, () => {
        showStatus('API key saved', 'success')
      })
    })

    clearBtn.addEventListener('click', () => {
      chrome.storage.sync.remove(STORAGE_KEY, () => {
        apiKeyInput.value = ''
        showStatus('API key cleared', 'success')
      })
    })

    clearCacheBtn.addEventListener('click', () => {
      chrome.storage.local.get(null, (items) => {
        const cacheKeys = Object.keys(items).filter(k => k.startsWith(CACHE_PREFIX))
        if (cacheKeys.length === 0) return showStatus('Cache is empty', 'success')
        chrome.storage.local.remove(cacheKeys, () => {
          showStatus(`Cleared ${cacheKeys.length} cached items`, 'success')
        })
      })
    })
  </script>
</body>
</html>
